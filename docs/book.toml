[book]
title = "cochranblock-mail"
description = "Sovereign SMTP/IMAP server. One Rust binary, zero cloud, zero SaaS."
authors = ["Michael Cochran"]
language = "en"
src = "src"

[output.html]
git-repository-url = "https://github.com/cochranblock/cochranblock-mail"
edit-url-template = "https://github.com/cochranblock/cochranblock-mail/edit/main/docs/src/{path}"
site-url = "/cochranblock-mail/"
additional-css = ["theme/custom.css"]
additional-js = ["theme/force-theme.js"]
default-theme = "coal"
preferred-dark-theme = "coal"
no-section-label = true

[output.html.fold]
enable = true
level = 1
